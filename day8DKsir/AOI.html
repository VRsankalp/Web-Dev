<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Example</title>
    <style>
        .user-card { border: 1px solid #ddd; padding: 10px; margin: 5px 0; border-radius: 4px; list-style: none; }
    </style>
</head>
<body>
    <button id="loadBtn">Load Users</button>
    <ul id="userList"></ul> <script>
    const btn = document.querySelector("#loadBtn");
    const userList = document.querySelector("#userList");

    btn.addEventListener("click", loadUsers);

    async function loadUsers() {
        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");
            
            // Check if the request was successful
            if (!response.ok) throw new Error("Network response was not ok");

            const data = await response.json();

            // Clear the list before adding new items
            userList.innerHTML = "";

            // Loop through and display
            data.forEach(user => {
                const li = document.createElement("li");
                li.className = "user-card";
                li.innerHTML = `<strong>${user.name}</strong> - ${user.email}`;
                userList.appendChild(li);
            });
            
        } catch (error) {
            console.error("There was an error:", error);
            userList.innerHTML = "<li>Failed to load users.</li>";
        }
    }
</script>
</body>
</html>
