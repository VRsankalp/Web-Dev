<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo App</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Inter", sans-serif;
}

/* Background */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at 20% 20%, #7f7fd5, transparent 40%),
radial-gradient(circle at 80% 80%, #86a8e7, transparent 40%),
linear-gradient(135deg,#1f1c2c,#928dab);

color:white;
}

/* Glass Container */
.container{
width:380px;
padding:35px;

border-radius:20px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);

box-shadow:
0 20px 60px rgba(0,0,0,0.4),
inset 0 0 0 1px rgba(255,255,255,0.1);

transition:0.4s;
}

/* Title */
h1{
text-align:center;
margin-bottom:25px;
font-weight:600;
letter-spacing:1px;
}

/* Input Area */
.input-box{
display:flex;
gap:10px;
}

/* Input */
input{
flex:1;
padding:12px 14px;

border:none;
outline:none;

border-radius:10px;

background:rgba(255,255,255,0.1);
color:white;

font-size:15px;

transition:0.3s;
}

/* Input Focus */
input:focus{
background:rgba(255,255,255,0.18);
}

/* Button */
button{
padding:12px 18px;

border:none;
border-radius:10px;

background:linear-gradient(135deg,#6a11cb,#2575fc);

color:white;
font-weight:600;

cursor:pointer;

transition:0.25s;
}

/* Button Hover */
button:hover{
transform:translateY(-2px) scale(1.03);

box-shadow:
0 8px 20px rgba(0,0,0,0.4);
}

/* List */
ul{
list-style:none;
margin-top:25px;
}

/* Task Card */
li{
padding:12px 14px;

margin-bottom:12px;

border-radius:10px;

background:rgba(255,255,255,0.1);

cursor:pointer;

transition:0.25s;
}

/* Hover Effect */
li:hover{
transform:translateX(6px);
background:rgba(255,255,255,0.2);
}

/* Completed */
.completed{
text-decoration:line-through;
opacity:0.5;
}

/* Scroll if many tasks */
ul{
max-height:250px;
overflow-y:auto;
}

/* Custom Scrollbar */
ul::-webkit-scrollbar{
width:6px;
}

ul::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.4);
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Todo List</h1>

<div class="input-box">
<input id="input" type="text" placeholder="Add a task">
<button id="btn">Add</button>
</div>

<ul id="list"></ul>

</div>

<script>

const task = document.querySelector("#input")
const btn = document.querySelector("#btn")
const list = document.querySelector("#list")

btn.addEventListener("click",function(){

if(task.value==="") return

const li = document.createElement("li")
li.innerText = task.value

list.appendChild(li)

task.value=""

})

list.addEventListener("click",function(e){

if(e.target.tagName==="LI"){
e.target.classList.toggle("completed")
}

})

</script>

</body>
</html>
