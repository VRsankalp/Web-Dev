<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Task List</h2>

    <ul id="list">

        <li>Task 1</li>
        <li>Task 2</li>
        <li>Task 3</li>
        <button>click </button>

    </ul>
</body>
<script>
    const list = document.querySelector("#list")

    list.addEventListener("click", function (e) {

        if (e.target.tagName === "LI") {

            e.target.style.textDecoration = "underline red wavy 1px"

        }

    })
</script>

</html>
